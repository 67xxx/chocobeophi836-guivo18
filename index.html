<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Muse🍓</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            font-family: 'Quicksand', sans-serif; color: #fff;
            display: flex; align-items: center; justify-content: center;
        }
        .stars-container { position: absolute; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }

        .cre-tag {
            position: fixed; bottom: 25px; right: 25px; 
            font-size: 0.65rem; opacity: 0.6; letter-spacing: 2px;
            text-transform: uppercase; z-index: 1000;
            border-right: 2px solid #ffb3c1; padding-right: 10px;
        }

        .center-content { text-align: center; z-index: 10; pointer-events: none; width: 100%; }
        .main-date {
            font-family: 'Dancing Script', cursive; font-size: clamp(5rem, 25vw, 8.5rem); margin: 0;
            background: linear-gradient(to bottom, #fff, #ffb3c1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,179,193,0.4));
        }

        .photo-dance {
            position: absolute; width: 130px; height: 130px; border-radius: 50%;
            border: 3px solid #ffb3c1; padding: 5px; object-fit: cover; z-index: 5;
            box-shadow: 0 0 20px rgba(255, 179, 193, 0.3);
        }
        .p1 { animation: danceX1 12s ease-in-out infinite alternate, danceY1 8s ease-in-out infinite alternate; }
        .p2 { animation: danceX2 12s ease-in-out infinite alternate, danceY2 8s ease-in-out infinite alternate; }
        @keyframes danceX1 { from { left: 5%; } to { left: 60%; } }
        @keyframes danceY1 { from { top: 10%; } to { top: 50%; } }
        @keyframes danceX2 { from { left: 60%; } to { left: 5%; } }
        @keyframes danceY2 { from { top: 50%; } to { top: 10%; } }

        #open-toggle { display: none; }
        .open-btn {
            position: absolute; bottom: 15%; padding: 14px 35px;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 40px;
            background: rgba(255,255,255,0.1); color: #fff; cursor: pointer;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: 0.3s; z-index: 100; text-transform: uppercase; letter-spacing: 2px;
        }

        .wish-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 12, 0.96); 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; overflow: hidden;
        }
        #open-toggle:checked ~ .wish-overlay { display: flex; }

        .letter { 
            width: 85%; max-width: 400px; text-align: center; 
            padding: 40px 25px; border-radius: 25px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.15); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: relative; z-index: 10;
        }
        .letter h2 { font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: #ffb3c1; margin-bottom: 20px; }
        .letter p { 
            font-size: 1.05rem; line-height: 1.8; color: #eee; margin: 0;
            white-space: pre-line; font-family: 'Quicksand', sans-serif;
        }
        .falling-heart {
            position: absolute; color: #ffb3c1; font-size: 15px;
            pointer-events: none; z-index: 1;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .heart-particle {
            position: fixed; pointer-events: none; z-index: 10000;
            font-size: 20px; animation: heartExplode 1.5s ease-out forwards;
        }
        @keyframes heartExplode {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr)); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="myMusic" loop>
        <source src="https://files.catbox.moe/44mhfw.mp3" type="audio/mpeg">
    </audio>

    <div class="cre-tag">© 2026 | DESIGNED BY DUCTHO123</div>
    <input type="checkbox" id="open-toggle">
    <div class="stars-container" id="stars"></div>

    <img src="https://i.postimg.cc/k408tsMZ/photo-2026-03-07-21-55-08-jpg-67.jpg" class="photo-dance p1">
    <img src="https://i.postimg.cc/RhdHZ9tV/photo-2026-03-08-11-28-02.jpg" class="photo-dance p2">

    <div class="center-content">
        <h1 class="main-date">8/3</h1>
        <div class="sub-text">MY PRINCESS, MY EVERYTHING</div>
    </div>

    <label for="open-toggle" class="open-btn" onclick="handleOpen(event)">Gửi em điều ngọt ngào ✨</label>

    <div class="wish-overlay" id="overlay">
        <div class="letter">
            <h2>Gửi Em...</h2>
            <p>"Thế là cưới thôi em ơi!" 😒❤️
Chúc công chúa một ngày 8/3 rạng rỡ và hạnh phúc.
Dù thế giới ngoài kia có thế nào, tớ vẫn luôn ở đây!
Cảm ơn êm6736,
<span style="color: #ffb3c1; font-weight: 700; font-size: 1.15rem; filter: drop-shadow(0 0 8px rgba(255,179,193,0.6));">Yêuu em rất nhiềuu!💋🌚</span></p>
            <label for="open-toggle" style="cursor:pointer; opacity: 0.5; font-size: 0.8rem; display: block; margin-top: 30px; letter-spacing: 2px;">[ ĐÓNG ]</label>
        </div>
    </div>

    <script>
        // Tạo sao nền
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            starsContainer.appendChild(star);
        }

        function handleOpen(e) {
            const audio = document.getElementById('myMusic');
            audio.play().catch(() => {});

            // Hiệu ứng nổ tim khi bấm nút
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            for(let i=0; i<30; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = ['❤️','💕','💖','🌸'][Math.floor(Math.random()*4)];
                heart.style.left = (x || window.innerWidth/2) + 'px';
                heart.style.top = (y || window.innerHeight*0.8) + 'px';
                const tx = (Math.random() - 0.5) * 400 + 'px';
                const ty = (Math.random() - 0.5) * 400 + 'px';
                const tr = Math.random() * 720 + 'deg';
                heart.style.setProperty('--tx', tx);
                heart.style.setProperty('--ty', ty);
                heart.style.setProperty('--tr', tr);
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1500);
            }

            // Bắt đầu hiệu ứng tim rơi khi mở thư
            if(!window.heartInterval) {
                window.heartInterval = setInterval(createFallingHeart, 300);
            }
        }
 function createFallingHeart() {
            const overlay = document.getElementById('overlay');
            if (getComputedStyle(overlay).display === 'flex') {
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.innerHTML = ['❤️','🌸','💕','✨'][Math.floor(Math.random()*4)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '-20px';
                heart.style.duration = (Math.random() * 3 + 2) + 's';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                heart.style.opacity = Math.random();
                overlay.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }
        }
    </script>
</body>
</html>
